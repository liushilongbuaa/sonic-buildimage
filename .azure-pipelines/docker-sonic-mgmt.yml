# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

schedules:
- cron: "0 8 * * *"
  displayName: Build and push sonic-mgmt image
  branches:
    include:
    - master
  always: true

trigger: none
pr: none

parameters:
- name: registry_server
  default: soniccr2

pool:
  vmImage: ubuntu-20.04

stages:
- stage: Build
  jobs:
  - job: Build
    timeoutInMinutes: 360
    steps:
    - template: ./template/cleanup.yml
    - checkout: self
      clean: true
      submodules: recursive
    - bash: |
        set -xe
        sudo pip install j2cli
        sudo gpasswd -a $(id -un) docker
      displayName: Init ENV
    - bash: |
        set -xe
        df -h
        make configure PLATFORM=generic
        make target/docker-sonic-mgmt.gz || df -h
        docker load -i target/docker-sonic-mgmt.gz
        docker tag docker-sonic-mgmt $REGISTRY_SERVER/docker-sonic-mgmt:latest
      env:
        REGISTRY_SERVER: ${{ parameters.registry_server }}.azurecr.io
      displayName: Build docker-sonic-mgmt.gz
    - task: Docker@2
      displayName: Upload image
      inputs:
        containerRegistry: ${{ parameters.registry_server }}
        repository: docker-sonic-mgmt
        command: push
        tags: latest
