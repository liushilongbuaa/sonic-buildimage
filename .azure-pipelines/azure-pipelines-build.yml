# The azure pipeline template for Official build, and upgrade version build

parameters:
- name: 'jobFilters'
  type: object
  default: ''
- name: 'buildOptions'
  type: string
  default: 'SONIC_CONFIG_BUILD_JOBS=1'
- name: 'preSteps'
  type: stepList
  default: []
- name: 'postSteps'
  type: stepList
  default: []
- name: 'jobGroups'
  type: object
  default: ''

jobs:
- template: azure-pipelines-image-template.yml
  parameters:
    jobFilters: ${{ parameters.jobFilters }}
    preSteps: ${{ parameters.preSteps }}
    postSteps: ${{ parameters.postSteps }}
    jobVariables:
      PLATFORM_AZP: $(GROUP_NAME)
      PLATFORM_ARCH: amd64
      BUILD_NUMBER: $(Build.BuildId)
      BUILD_OPTIONS: ${{ parameters.buildOptions }}
      DOCKER_DATA_ROOT_FOR_MULTIARCH: /data/march/docker
      dbg_image: no
      swi_image: no
      raw_image: no
      sync_rpc_image: no
      platform_rpc: no
    ${{ if ne(parameters.jobGroups, '') }}:
      jobGroups: ${{ parameters.jobGroups }}
    ${{ if eq(parameters.jobGroups, '') }}:
      jobGroups:
        - name: vs
          variables:
            dbg_image: yes

        - name: barefoot
          variables:
            swi_image: yes

        - name: broadcom
          variables:
            dbg_image: yes
            swi_image: yes
            raw_image: yes
            sync_rpc_image: yes
            platform_rpc: brcm

        - name: centec
          variables:
            dbg_image: yes
            sync_rpc_image: yes
            platform_rpc: centec

        - name: centec-arm64
          pool: sonicbld_8c
          timeoutInMinutes: 2160
          variables:
            PLATFORM_ARCH: arm64

        - name: generic
          variables:
            dbg_image: yes

        - name: innovium
          variables:
            swi_image: yes

        - name: marvell-armhf
          pool: sonicbld_8c
          timeoutInMinutes: 2160
          variables:
            PLATFORM_ARCH: armhf

        - name: mellanox
          variables:
            dbg_image: yes
            sync_rpc_image: yes
            platform_rpc: mlnx

        - name: nephos
          variables:
            dbg_image: yes
            sync_rpc_image: yes
            platform_rpc: nephos

    buildSteps:
      - bash: |
          set -x
          mkdir target
          touch target/sonic-broadcom.bin
        displayName: "Build sonic image"
